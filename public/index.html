<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda - Administrador</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f6f8; color: #333; }
  header { background: #2c3e50; color: white; padding: 16px 24px; font-size: 1.3rem; font-weight: bold; }
  .container { max-width: 1400px; margin: 24px auto; padding: 0 16px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
  input, select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
  button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; }
  .btn-primary { background: #2980b9; color: white; }
  .btn-success { background: #27ae60; color: white; }
  .btn-danger { background: #e74c3c; color: white; }
  .btn-warning { background: #f39c12; color: white; }
  .btn-excel { background: #1d6f42; color: white; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  th { background: #2c3e50; color: white; padding: 12px; text-align: left; cursor: pointer; user-select: none; }
  th:hover { background: #34495e; }
  td { padding: 10px 12px; border-bottom: 1px solid #eee; }
  tr:hover td { background: #f0f4f8; }
  .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; }
  .badge-on { background: #d5f5e3; color: #1e8449; }
  .badge-off { background: #fadbd8; color: #922b21; }
  .pagination { display: flex; gap: 8px; margin-top: 16px; align-items: center; justify-content: center; }
  .pagination button { min-width: 36px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 10px; padding: 28px; width: 460px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 0.9rem; }
  .form-group input, .form-group select { width: 100%; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .info { color: #666; font-size: 0.9rem; }
</style>
</head>
<body>
<header>🛒 Administrador de Productos</header>
<div class="container">
  <div class="toolbar">
    <input type="text" id="busqueda" placeholder="Buscar por nombre, SKU, categoría o marca..." style="flex:1; min-width:200px">
    <select id="filtroCategoria"><option value="">Todas las categorías</option></select>
    <button class="btn-primary" onclick="cargar()">🔍 Buscar</button>
    <button class="btn-success" onclick="abrirModal()">➕ Nuevo</button>
    <button class="btn-excel" onclick="exportarExcel()">📥 Excel</button>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="ordenar('id')">ID ↕</th>
        <th onclick="ordenar('nombre')">Nombre ↕</th>
        <th onclick="ordenar('sku')">SKU ↕</th>
        <th onclick="ordenar('categoria')">Categoría ↕</th>
        <th onclick="ordenar('marca')">Marca ↕</th>
        <th>Código Barras</th>
        <th onclick="ordenar('precio')">Precio ↕</th>
        <th onclick="ordenar('stock')">Stock ↕</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <div class="pagination">
    <button class="btn-primary" onclick="cambiarPagina(-1)">◀ Anterior</button>
    <span class="info" id="infoPagina"></span>
    <button class="btn-primary" onclick="cambiarPagina(1)">Siguiente ▶</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitulo">Nuevo Producto</h2>
    <div class="form-group"><label>Nombre *</label><input id="fNombre" placeholder="Nombre del producto"></div>
    <div class="form-group"><label>SKU *</label><input id="fSku" placeholder="Código único"></div>
    <div class="form-group"><label>Categoría *</label><input id="fCategoria" placeholder="Ej: Electrónica"></div>
    <div class="form-group"><label>Marca</label><input id="fMarca" placeholder="Ej: Samsung"></div>
    <div class="form-group"><label>Código de Barras</label><input id="fCodigoBarras" placeholder="Ej: 7501234567890"></div>
    <div class="form-group"><label>Precio *</label><input id="fPrecio" type="number" step="0.01" placeholder="0.00"></div>
    <div class="form-group"><label>Stock *</label><input id="fStock" type="number" placeholder="0"></div>
    <div class="form-group"><label>Estado</label>
      <select id="fActivo"><option value="true">Activo</option><option value="false">Inactivo</option></select>
    </div>
    <div class="form-actions">
      <button class="btn-danger" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-success" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<script>
let pagina = 1, limite = 10, ordenCol = 'id', ordenDir = 'ASC', editId = null;

async function cargar() {
  const b = document.getElementById('busqueda').value;
  const c = document.getElementById('filtroCategoria').value;
  const res = await fetch(`/api/productos?busqueda=${encodeURIComponent(b)}&categoria=${encodeURIComponent(c)}&pagina=${pagina}&limite=${limite}&orden=${ordenCol}&dir=${ordenDir}`);
  const data = await res.json();
  const tbody = document.getElementById('tabla');
  tbody.innerHTML = '';
  data.datos.forEach(p => {
    tbody.innerHTML += `<tr>
      <td>${p.id}</td>
      <td>${p.nombre}</td>
      <td>${p.sku}</td>
      <td>${p.categoria}</td>
      <td>${p.marca ?? ''}</td>
      <td>${p.codigo_barras ?? ''}</td>
      <td>$${parseFloat(p.precio).toFixed(2)}</td>
      <td>${p.stock}</td>
      <td><span class="badge ${p.activo ? 'badge-on' : 'badge-off'}">${p.activo ? 'Activo' : 'Inactivo'}</span></td>
      <td>
        <button class="btn-warning" onclick="editar(${p.id})">✏️</button>
        <button class="btn-danger" onclick="eliminar(${p.id})">🗑️</button>
      </td>
    </tr>`;
  });
  const totalPags = Math.ceil(data.total / limite);
  document.getElementById('infoPagina').textContent = `Página ${pagina} de ${totalPags} (${data.total} registros)`;
}

async function cargarCategorias() {
  const res = await fetch('/api/categorias');
  const cats = await res.json();
  const sel = document.getElementById('filtroCategoria');
  cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
}

function ordenar(col) {
  if (ordenCol === col) ordenDir = ordenDir === 'ASC' ? 'DESC' : 'ASC';
  else { ordenCol = col; ordenDir = 'ASC'; }
  cargar();
}

function cambiarPagina(delta) {
  pagina = Math.max(1, pagina + delta);
  cargar();
}

function abrirModal(id = null) {
  editId = id;
  document.getElementById('modalTitulo').textContent = id ? 'Editar Producto' : 'Nuevo Producto';
  if (!id) {
    ['fNombre','fSku','fCategoria','fPrecio','fStock','fMarca','fCodigoBarras'].forEach(f => document.getElementById(f).value = '');
    document.getElementById('fActivo').value = 'true';
  }
  document.getElementById('modalOverlay').classList.add('active');
}

function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  editId = null;
}

async function editar(id) {
  const res = await fetch(`/api/productos/${id}`);
  const p = await res.json();
  document.getElementById('fNombre').value = p.nombre;
  document.getElementById('fSku').value = p.sku;
  document.getElementById('fCategoria').value = p.categoria;
  document.getElementById('fMarca').value = p.marca ?? '';
  document.getElementById('fCodigoBarras').value = p.codigo_barras ?? '';
  document.getElementById('fPrecio').value = p.precio;
  document.getElementById('fStock').value = p.stock;
  document.getElementById('fActivo').value = p.activo ? 'true' : 'false';
  abrirModal(id);
}

async function guardar() {
  const body = {
    nombre: document.getElementById('fNombre').value.trim(),
    sku: document.getElementById('fSku').value.trim(),
    categoria: document.getElementById('fCategoria').value.trim(),
    marca: document.getElementById('fMarca').value.trim() || null,
    codigo_barras: document.getElementById('fCodigoBarras').value.trim() || null,
    precio: parseFloat(document.getElementById('fPrecio').value),
    stock: parseInt(document.getElementById('fStock').value),
    activo: document.getElementById('fActivo').value === 'true'
  };
  if (!body.nombre || !body.sku || !body.categoria || isNaN(body.precio) || isNaN(body.stock))
    return alert('Por favor completa todos los campos obligatorios.');
  const url = editId ? `/api/productos/${editId}` : '/api/productos';
  const method = editId ? 'PUT' : 'POST';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if (res.ok) { cerrarModal(); cargar(); }
  else { const e = await res.json(); alert('Error: ' + e.error); }
}

async function eliminar(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  await fetch(`/api/productos/${id}`, { method: 'DELETE' });
  cargar();
}

function exportarExcel() {
  const b = document.getElementById('busqueda').value;
  const c = document.getElementById('filtroCategoria').value;
  window.location.href = `/api/export/excel?busqueda=${encodeURIComponent(b)}&categoria=${encodeURIComponent(c)}`;
}

cargarCategorias();
cargar();
</script>
</body>
</html>
